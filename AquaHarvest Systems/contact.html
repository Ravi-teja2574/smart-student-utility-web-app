                    <label>Name</label>

                    <label>Email</label>

                </div>

                <div style="margin-bottom: 15px;">
                    <label>Message</label>
                    <textarea rows="6" style="width: 100%; padding: 10px; border: 1px solid #ccc; margin-top: 5px;" required></textarea>
                </div>

                <button type="submit" class="btn" style="width: 100%; border: none; cursor: pointer;">Send Message</button>
            </form>
