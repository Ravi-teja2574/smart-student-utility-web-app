<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student website</title>
    <link rel="stylesheet" href="style.css">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme-toggle">
    <button onclick="toggleTheme()" id="themeBtn">🌙 Dark Mode</button>
    </div>
    <header>
        <h1>Smart Student Utility</h1>
        <p>Calculate grades, check palindromes, and more!</p>
    </header>
    <main class="container">
        <section class="card">
            <h2>Grade Calculator</h2>
            <div class="input-group">
        <input type="text" id="name" placeholder="Student Name">
                <input type="number" id="javascript" placeholder="JavaScript Marks">
                <input type="number" id="html" placeholder="HTML Marks">
                <input type="number" id="css" placeholder="CSS Marks">
                <input type="number" id="python" placeholder="Python Marks">
                <input type="number" id="java" placeholder="Java Marks">
                <button onclick="calculate()">Calculate Result</button>
                <button class="btn-reset" onclick="resetSection('result', 
                ['name', 'javascript', 'html', 'css', 'python', 'java'])">Reset</button>
            </div>
            <div id="result" class="output"></div>
        </section>

        <section class="card">
            <h2>Palindrome Checker</h2>
            <div class="input-group">
                <input type="text" id="word" placeholder="Enter a word">
                <button onclick="checkPalindrome()">Check Palindrome</button>
            </div>
            <div id="palindrome-check" class="output"></div>
        </section>

        <section class="card">
            <h2>Even/Odd Checker</h2>
            <div class="input-group">
                <input type="number" id="number" placeholder="Enter a number">
                <button onclick="checkEvenOdd()">Check Even/Odd</button>
            </div>
            <div id="even-odd-check" class="output"></div>
        </section>

        <section class="card">
            <h2>Login</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="Enter your username">
                <input type="password" id="password" placeholder="Enter your password">
                <button onclick="checklogin()">Login</button>
            </div>
            <div id="login-check" class="output"></div>
        </section>
    </main>
    <script src="submit.js"></script>
</body>
</html>
